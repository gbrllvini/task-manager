services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    environment:
      POSTGRES_DB: taskmanagerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - taskmanager_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanagerdb"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  api:
    container_name: taskmanager-api
    build:
      context: ./backend
      dockerfile: TaskManager.API/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=taskmanagerdb;Username=postgres;Password=postgres
    ports:
      - "5134:8080"
    restart: unless-stopped

  frontend:
    container_name: taskmanager-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "4200:80"
    profiles:
      - frontend
    restart: unless-stopped

volumes:
  taskmanager_postgres_data:
