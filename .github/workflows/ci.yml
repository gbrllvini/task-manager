name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/TaskManager.sln

      - name: Build
        run: dotnet build backend/TaskManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/TaskManager.sln --configuration Release --no-build --verbosity normal
